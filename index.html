<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>幸运大转盘 · 水果捞</title>
<style>
  :root{ --bg1:#6a11cb; --bg2:#2575fc; --gold:#ffd76a; --gold2:#f7a52b; --card:#fff; --ink:#2b2b3a; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100%;display:flex;flex-direction:column;
    align-items:center;padding:20px 16px 40px;user-select:none;}
  .title{color:#fff;font-size:26px;font-weight:800;letter-spacing:2px;margin:6px 0 2px;text-shadow:0 2px 8px rgba(0,0,0,.25);}
  .subtitle{color:rgba(255,255,255,.85);font-size:13px;margin-bottom:14px;}

  .wheel-wrap{position:relative;width:min(86vw,360px);aspect-ratio:1/1;margin:6px auto 4px;}
  .wheel-ring{position:absolute;inset:-10px;border-radius:50%;
    background:radial-gradient(circle at 50% 50%,#fff6d8,var(--gold) 60%,var(--gold2));
    box-shadow:0 10px 30px rgba(0,0,0,.35), inset 0 0 0 6px rgba(255,255,255,.4);}
  .lights{position:absolute;inset:-10px;border-radius:50%;pointer-events:none;}
  .lights i{position:absolute;width:8px;height:8px;border-radius:50%;background:#fff;left:50%;top:50%;margin:-4px 0 0 -4px;
    box-shadow:0 0 6px 2px rgba(255,255,255,.9);animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;border-radius:50%;}
  .pointer{position:absolute;left:50%;top:-6px;transform:translateX(-50%);width:0;height:0;
    border-left:16px solid transparent;border-right:16px solid transparent;border-top:26px solid #ff3b30;z-index:5;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,.35));}
  .hub{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:24%;aspect-ratio:1/1;border-radius:50%;z-index:4;
    background:radial-gradient(circle at 50% 35%,#ff7a7a,#ff3b30);color:#fff;font-weight:800;font-size:clamp(15px,4.6vw,20px);
    letter-spacing:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:4px solid #fff;
    box-shadow:0 6px 14px rgba(0,0,0,.35);transition:transform .08s;text-align:center;line-height:1.1;}
  .hub:active{transform:translate(-50%,-50%) scale(.94);}
  .hub.disabled{filter:grayscale(.4) brightness(.95);cursor:not-allowed;}

  .meta{color:#fff;font-size:13px;margin:14px 0 2px;text-align:center;opacity:.92;}
  .actions{display:flex;gap:10px;margin-top:10px;}
  .btn{appearance:none;border:none;border-radius:999px;padding:10px 18px;font-size:14px;font-weight:600;
    background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.35);cursor:pointer;}
  .btn:active{transform:scale(.96);}
  .btn.primary{background:#fff;color:var(--bg1);border-color:#fff;}

  .myprize{width:min(86vw,360px);margin:16px auto 0;background:rgba(255,255,255,.14);border-radius:14px;padding:14px;color:#fff;
    text-align:center;display:none;}
  .myprize.show{display:block;}
  .myprize .p{font-size:18px;font-weight:800;color:var(--gold);}
  .myprize .c{margin-top:6px;font-size:14px;letter-spacing:2px;}

  .mask{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:24px;}
  .mask.show{display:flex;}
  .dialog{background:var(--card);border-radius:18px;width:100%;max-width:330px;padding:24px 20px;text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.4);animation:pop .25s ease;}
  @keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
  .dialog .emoji{font-size:46px;}
  .dialog h2{margin:8px 0 4px;font-size:20px;}
  .dialog .prize{font-size:22px;font-weight:800;color:var(--gold2);margin:6px 0 2px;}
  .dialog p{color:#666;font-size:13px;margin:6px 0 14px;}
  .codeBox{margin:10px 0;}
  .codeBox .lbl{font-size:12px;color:#999;}
  .codeBox .num{font-size:30px;font-weight:800;letter-spacing:6px;color:#222;margin:2px 0 8px;}
  #codeQr{display:flex;justify-content:center;}
  #codeQr img,#codeQr canvas,#shareQr img,#shareQr canvas{border-radius:8px;}
  .dialog .btn{background:linear-gradient(90deg,var(--bg1),var(--bg2));color:#fff;border:none;width:100%;padding:12px;margin-top:8px;}
  .field{text-align:left;margin:10px 0;}
  .field label{font-size:13px;color:#555;display:block;margin-bottom:4px;}
  .field input{width:100%;padding:11px 12px;border:1px solid #ddd;border-radius:10px;font-size:16px;outline:none;}
  .field input:focus{border-color:var(--bg2);}
  .err{color:#ff3b30;font-size:12px;min-height:16px;text-align:left;margin-top:2px;}
  #shareQr{display:flex;justify-content:center;margin:6px 0;}
  .qr-url{word-break:break-all;font-size:12px;color:#888;margin:4px 0 12px;}
  .rules{width:min(86vw,360px);margin:18px auto 0;color:rgba(255,255,255,.85);font-size:12px;line-height:1.7;}
  .rules b{color:#fff;}
</style>
</head>
<body>
  <div class="title">🍧 幸运大转盘</div>
  <div class="subtitle">扫码即玩 · 中奖到店核销</div>

  <div class="wheel-wrap">
    <div class="wheel-ring"></div>
    <div class="lights" id="lights"></div>
    <canvas id="wheel"></canvas>
    <div class="pointer"></div>
    <div class="hub" id="go">抽奖</div>
  </div>

  <div class="meta">每个手机号仅限抽一次</div>
  <div class="actions">
    <button class="btn primary" id="shareBtn">📱 扫码分享</button>
  </div>

  <div class="myprize" id="myprize">
    <div>你已参与 · 我的奖品</div>
    <div class="p" id="myPrizeName">-</div>
    <div class="c" id="myPrizeCode"></div>
  </div>

  <div class="rules">
    <b>活动规则</b><br>
    1. 每个手机号限抽 1 次；<br>
    2. 中奖优惠券<b>无有效期</b>，下次到店出示核销码即可使用；<br>
    3. 一券一次性，核销后失效，最终解释权归本店所有。
  </div>

  <!-- 填手机号 -->
  <div class="mask" id="formMask">
    <div class="dialog">
      <div class="emoji">🎯</div>
      <h2>抽奖前先登记</h2>
      <p>用于核销奖品，每个手机号仅 1 次机会</p>
      <div class="field">
        <label>手机号 *</label>
        <input id="inPhone" type="tel" inputmode="numeric" maxlength="11" placeholder="请输入手机号">
      </div>
      <div class="field">
        <label>称呼（选填）</label>
        <input id="inName" type="text" maxlength="20" placeholder="怎么称呼你">
      </div>
      <div class="err" id="formErr"></div>
      <button class="btn" id="submitDraw">开始抽奖</button>
    </div>
  </div>

  <!-- 中奖结果 -->
  <div class="mask" id="resultMask">
    <div class="dialog">
      <div class="emoji" id="resultEmoji">🎁</div>
      <h2 id="resultTitle">恭喜中奖！</h2>
      <div class="prize" id="resultPrize">-</div>
      <div class="codeBox" id="codeBox">
        <div class="lbl">核销码（到店出示给店员）</div>
        <div class="num" id="resultCode">-</div>
        <div id="codeQr"></div>
      </div>
      <p id="resultTip">截图保存，下次到店出示即可使用</p>
      <button class="btn" onclick="document.getElementById('resultMask').classList.remove('show')">开心收下</button>
    </div>
  </div>

  <!-- 分享二维码 -->
  <div class="mask" id="qrMask">
    <div class="dialog">
      <div class="emoji">📲</div>
      <h2>扫码参与活动</h2>
      <div id="shareQr"></div>
      <div class="qr-url" id="qrUrl"></div>
      <button class="btn" onclick="document.getElementById('qrMask').classList.remove('show')">关闭</button>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@gh-pages/qrcode.min.js"></script>
<script>
const SPIN_SECONDS = 4, SPIN_ROUNDS = 6, TWO_PI = Math.PI * 2;
// 后端拿不到时的兜底奖品（仅用于静态预览，真实结果以服务器为准）
let PRIZES = [
  { id:1, name:'一等奖·免费水果捞', color:'#ff6b6b' },
  { id:2, name:'二等奖·单份5折',    color:'#b794f6' },
  { id:3, name:'三等奖·第二份半价', color:'#6ec1ff' },
  { id:4, name:'5元代金券',         color:'#ffe66d' },
  { id:5, name:'谢谢参与',          color:'#dfe6e9' },
];
let N, SEG;

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
let size=0, cx=0, cy=0, R=0, dpr=Math.max(1, window.devicePixelRatio||1);
let currentRot = -Math.PI/2, spinning = false;

function recalc(){ N = PRIZES.length; SEG = TWO_PI / N; }

function setupCanvas(){
  const css = canvas.getBoundingClientRect();
  size = css.width;
  canvas.width = Math.round(size*dpr); canvas.height = Math.round(size*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  cx=size/2; cy=size/2; R=size/2-4;
  drawWheel(currentRot);
}
function drawWheel(rot){
  ctx.clearRect(0,0,size,size);
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot);
  for(let i=0;i<N;i++){
    const start=i*SEG, end=start+SEG;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R,start,end); ctx.closePath();
    ctx.fillStyle = PRIZES[i].color || '#ddd'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.55)'; ctx.lineWidth=1; ctx.stroke();
    ctx.save(); ctx.rotate(start+SEG/2);
    ctx.textAlign='right'; ctx.textBaseline='middle'; ctx.fillStyle='#5a3b00';
    const fs=Math.max(10,Math.min(14,size/24)); ctx.font=`700 ${fs}px sans-serif`;
    let label=PRIZES[i].name; if(label.length>8) label=label.slice(0,8);
    ctx.fillText(label, R-12, 0);
    ctx.restore();
  }
  ctx.restore();
}
(function lights(){
  const box=document.getElementById('lights'), num=16;
  for(let i=0;i<num;i++){const a=(i/num)*TWO_PI;const el=document.createElement('i');
    el.style.left=`calc(50% + ${Math.cos(a)*50}% )`; el.style.top=`calc(50% + ${Math.sin(a)*50}% )`;
    el.style.animationDelay=(i%2?.5:0)+'s'; box.appendChild(el);}
})();
function easeOutCubic(t){return 1-Math.pow(1-t,3);}

function spinTo(idx, cb){
  const jitter=(Math.random()-0.5)*SEG*0.6;
  const targetCenter=idx*SEG+SEG/2;
  let base=-Math.PI/2-targetCenter+jitter;
  const startRot=currentRot;
  let delta=((base-(startRot%TWO_PI))%TWO_PI+TWO_PI)%TWO_PI;
  const finalRot=startRot+SPIN_ROUNDS*TWO_PI+delta;
  const dur=SPIN_SECONDS*1000, t0=performance.now();
  (function frame(now){
    const p=Math.min(1,(now-t0)/dur);
    currentRot=startRot+(finalRot-startRot)*easeOutCubic(p);
    drawWheel(currentRot);
    if(p<1) requestAnimationFrame(frame);
    else { currentRot=finalRot; cb && cb(); }
  })(performance.now());
}

/* ---------- 与后端交互 ---------- */
const $ = s => document.querySelector(s);
const go = $('#go');

async function loadPrizes(){
  try{
    const r = await fetch('/api/prizes');
    const d = await r.json();
    if(d.ok && d.prizes && d.prizes.length){ PRIZES = d.prizes; }
  }catch(e){ /* 静态预览：用兜底列表 */ }
  recalc(); setupCanvas();
}

function showMyPrize(res){
  const lose = res.isLose;
  $('#myprize').classList.add('show');
  $('#myPrizeName').textContent = res.prizeName;
  $('#myPrizeCode').textContent = lose ? '' : ('核销码：' + res.code);
  go.classList.add('disabled');
  go.textContent = '已抽过';
}

function openResult(res){
  const lose = res.isLose;
  $('#resultEmoji').textContent = lose ? '🙈' : '🎉';
  $('#resultTitle').textContent = lose ? '差一点点' : '恭喜中奖！';
  $('#resultPrize').textContent = res.prizeName;
  if(lose){
    $('#codeBox').style.display='none';
    $('#resultTip').textContent='别灰心，下次活动再来试试～';
  }else{
    $('#codeBox').style.display='block';
    $('#resultCode').textContent = res.code;
    $('#resultTip').textContent='截图保存，下次到店把核销码出示给店员即可使用';
    const box=$('#codeQr'); box.innerHTML='';
    if(window.QRCode) new QRCode(box,{text:res.code,width:120,height:120,correctLevel:QRCode.CorrectLevel.M});
  }
  $('#resultMask').classList.add('show');
}

function saveLocal(res){ try{ localStorage.setItem('lw_result', JSON.stringify(res)); }catch(e){} }
function loadLocal(){ try{ return JSON.parse(localStorage.getItem('lw_result')||'null'); }catch(e){ return null; } }

go.addEventListener('click', ()=>{
  if(spinning) return;
  const saved = loadLocal();
  if(saved){ openResult(saved); return; }     // 已抽过 → 直接看结果
  $('#formErr').textContent=''; $('#formMask').classList.add('show');
  setTimeout(()=>$('#inPhone').focus(), 200);
});

$('#submitDraw').addEventListener('click', async ()=>{
  const phone=$('#inPhone').value.trim(), name=$('#inName').value.trim();
  if(!/^1\d{10}$/.test(phone)){ $('#formErr').textContent='请输入正确的 11 位手机号'; return; }
  const btn=$('#submitDraw'); btn.disabled=true; btn.textContent='抽奖中…';
  try{
    const r=await fetch('/api/draw',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({phone,name})});
    const d=await r.json();
    if(!d.ok){ $('#formErr').textContent=d.error||'抽奖失败，请重试'; btn.disabled=false; btn.textContent='开始抽奖'; return; }
    $('#formMask').classList.remove('show'); btn.disabled=false; btn.textContent='开始抽奖';
    saveLocal(d); showMyPrize(d);
    const idx=Math.max(0, PRIZES.findIndex(p=>p.id===d.prizeId));
    spinning=true; go.classList.add('disabled');
    spinTo(idx, ()=>{ spinning=false; openResult(d); });
  }catch(e){
    $('#formErr').textContent='网络异常，请重试（如在静态预览页，需用正式活动地址）';
    btn.disabled=false; btn.textContent='开始抽奖';
  }
});

/* ---------- 扫码分享 ---------- */
$('#shareBtn').addEventListener('click', ()=>{
  const url=location.href.split('#')[0];
  $('#qrUrl').textContent = location.protocol==='file:' ? '当前是本地文件，部署后扫码才能打开。' : url;
  const box=$('#shareQr'); box.innerHTML='';
  if(window.QRCode) new QRCode(box,{text:url,width:180,height:180,correctLevel:QRCode.CorrectLevel.M});
  else box.innerHTML='<p style="color:#888;font-size:13px">二维码组件加载失败（需联网）</p>';
  $('#qrMask').classList.add('show');
});

/* ---------- init ---------- */
window.addEventListener('resize', setupCanvas);
recalc(); setupCanvas();
loadPrizes().then(()=>{ const saved=loadLocal(); if(saved) showMyPrize(saved); });
</script>
</body>
</html>
